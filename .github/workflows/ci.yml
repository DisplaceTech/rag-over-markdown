name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Static checks only: the runtime pipeline needs the ext-infer and
  # ext-turbovec binaries plus ~1.9GB of GGUF models, which stay out of
  # CI by design (same policy as the extensions themselves). PHPStan
  # analyzes against the committed extension stubs instead.
  lint:
    name: cs + static analysis (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - run: composer validate --strict

      - run: composer install --no-interaction --no-progress --ignore-platform-req=ext-infer --ignore-platform-req=ext-turbovec

      - run: composer cs
        if: matrix.php == '8.4'

      - run: composer stan
